services:
  mysql:
    image: mysql:8.0
    container_name: abhedyam-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Madhu7814}
      MYSQL_USER: ${DB_USERNAME:-madhu}
      MYSQL_PASSWORD: ${DB_PASSWORD:-Madhu7814}
      MYSQL_DATABASE: ${DB_NAME:-abhedyam}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - abhedyam-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --bind-address=0.0.0.0
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "madhu", "-pMadhu7814"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: abhedyam-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - abhedyam-network
    command: >
      sh -c "
      if [ -n \"$$REDIS_PASSWORD\" ] && [ \"$$REDIS_PASSWORD\" != \"\" ]; then
        redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\"
      else
        redis-server --appendonly yes
      fi
      "
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  abhedyam-backend:
    image: madhukinnera/abhedyam:linux-amd64
    container_name: abhedyam-backend
    restart: unless-stopped
    pull_policy: always
    ports:
      - "8600:8080"
    environment:
      # Database Configuration
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME:-abhedyam}?createDatabaseIfNotExist=true
      DB_USERNAME: ${DB_USERNAME:-madhu}
      DB_PASSWORD: ${DB_PASSWORD:-Madhu7814}
      
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      
      # Server Configuration
      PORT: 8080
      
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-changeme-this-is-a-very-long-secret-key-for-jwt-token-generation}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1296000000}
      
      # Email Configuration
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
      EMAIL_FROM: ${EMAIL_FROM:-marava.technologies@gmail.com}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_SMTP_AUTH: ${EMAIL_SMTP_AUTH:-true}
      EMAIL_STARTTLS_ENABLE: ${EMAIL_STARTTLS_ENABLE:-true}
      
      # 2Factor SMS Configuration
      TWO_FACTOR_API_KEY: ${TWO_FACTOR_API_KEY:-3f77c89e-c18d-11f0-a6b2-0200cd936042}
      TWO_FACTOR_OTP_TEMPLATE: ${TWO_FACTOR_OTP_TEMPLATE:-Abhedyam_OTP_Template}
      
      # Firebase Configuration
      FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS:-}
      
      # Cashfree Payment Gateway
      CASHFREE_CLIENT_ID: ${CASHFREE_CLIENT_ID:-}
      CASHFREE_SECRET: ${CASHFREE_SECRET:-}
      
      # Feature Flags
      CALL_LOG_SYNC_ENABLED: ${CALL_LOG_SYNC_ENABLED:-true}
      DAILY_QUOTE_ENABLED: ${DAILY_QUOTE_ENABLED:-true}
      
      # CORS Configuration
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:8080}
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - abhedyam-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  abhedyam-network:
    driver: bridge

