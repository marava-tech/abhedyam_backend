spring:
  application:
    name: abhedyam-backend

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/abhedyam?createDatabaseIfNotExist=true&serverTimezone=Asia/Kolkata}
    username: ${DB_USERNAME:madhu}
    password: ${DB_PASSWORD:Madhu7814}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  jackson:
    time-zone: Asia/Kolkata

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          use_get_generated_keys: true
          time_zone: Asia/Kolkata
        id:
          new_generator_mappings: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000ms
  mail:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${EMAIL_SMTP_AUTH:true}
          starttls:
            enable: ${EMAIL_STARTTLS_ENABLE:true}
            required: true
          ssl:
            trust: ${EMAIL_SSL_TRUST:smtp.gmail.com}

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:changeme-this-is-a-very-long-secret-key-for-jwt-token-generation}
    expiration: ${JWT_EXPIRATION:1296000000}
    customer-expiration: ${JWT_CUSTOMER_EXPIRATION:2592000000}
  twofactor:
    api-key: ${TWO_FACTOR_API_KEY:}
    otp-template: ${TWO_FACTOR_OTP_TEMPLATE:Abhedyam_OTP_Template}
  firebase:
    credentials: ${FIREBASE_CREDENTIALS:}
  email:
    enabled: ${EMAIL_ENABLED:true}
    from: ${EMAIL_FROM:marava.technologies@gmail.com}
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${EMAIL_SMTP_AUTH:true}
          starttls:
            enable: ${EMAIL_STARTTLS_ENABLE:true}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_live_S3lbwMFwIBOChE}
    key-secret: ${RAZORPAY_KEY_SECRET:jfVGsSup7WFRwFpPKvg3kDIn}
    custom-payment-page-url: ${RAZORPAY_CUSTOM_PAYMENT_PAGE_URL:}
  features:
    global:
      dailyQuote: ${DAILY_QUOTE_ENABLED:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:8080}
  cache:
    invalidate:
      key: ${CACHE_INVALIDATE_KEY:Madhu7814}
  subscription:
    admin-key: ${SUBSCRIPTION_ADMIN_KEY:Madhu7814}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:dhssmiyoc}
    api-key: ${CLOUDINARY_API_KEY:177531384514114}
    api-secret: ${CLOUDINARY_API_SECRET:EDGc-oLd1WEpwWav_GYeugZHaTo}

