spring:
  application:
    name: abhedyam-backend

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/abhedyam?createDatabaseIfNotExist=true&serverTimezone=Asia/Kolkata}
    username: ${DB_USERNAME:madhu}
    password: ${DB_PASSWORD:REDACTED_ADMIN_KEY}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Kolkata

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          use_get_generated_keys: true
          time_zone: Asia/Kolkata
        id:
          new_generator_mappings: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  mail:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:marava.technologies@gmail.com}
    password: ${EMAIL_PASSWORD:REDACTED_GMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${EMAIL_SMTP_AUTH:true}
          starttls:
            enable: ${EMAIL_STARTTLS_ENABLE:true}
            required: true
          ssl:
            trust: ${EMAIL_SSL_TRUST:smtp.gmail.com}

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:REDACTED_JWT_SECRET}
    expiration: ${JWT_EXPIRATION:1296000000}
    customer-expiration: ${JWT_CUSTOMER_EXPIRATION:2592000000}
  twofactor:
    api-key: ${TWO_FACTOR_API_KEY:3f77c89e-c18d-11f0-a6b2-0200cd936042}
    otp-template: ${TWO_FACTOR_OTP_TEMPLATE:Abhedyam_OTP_Template}
  firebase:
    credentials: ${FIREBASE_CREDENTIALS:}
  email:
    enabled: ${EMAIL_ENABLED:true}
    from: ${EMAIL_FROM:marava.technologies@gmail.com}
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${EMAIL_SMTP_AUTH:true}
          starttls:
            enable: ${EMAIL_STARTTLS_ENABLE:true}
  cashfree:
    client-id: ${CASHFREE_CLIENT_ID:}
    client-secret: ${CASHFREE_SECRET:}
  features:
    global:
      callLogSync: ${CALL_LOG_SYNC_ENABLED:true}
      dailyQuote: ${DAILY_QUOTE_ENABLED:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:8080}

