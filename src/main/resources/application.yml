spring:
  application:
    name: abhedyam-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/abhedyam?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: ${PORT:8080}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:changeme-this-is-a-very-long-secret-key-for-jwt-token-generation}
    expiration: ${JWT_EXPIRATION:86400000}
  fast2sms:
    api-key: ${FAST2SMS_API_KEY:}
  cashfree:
    client-id: ${CASHFREE_CLIENT_ID:}
    client-secret: ${CASHFREE_SECRET:}
  chatgpt:
    api-key: ${CHATGPT_API_KEY:}
  storage:
    path: ${STORAGE_PATH:./storage}
  features:
    global:
      aiInvoiceProcessing: ${AI_INVOICE_ENABLED:true}
      callLogSync: ${CALL_LOG_SYNC_ENABLED:true}
      dailyQuote: ${DAILY_QUOTE_ENABLED:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:8080}
  upload:
    max-file-size-mb: ${MAX_FILE_SIZE_MB:10}
    allowed-image-types: image/jpeg,image/png,image/gif,image/webp
    allowed-document-types: application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document

