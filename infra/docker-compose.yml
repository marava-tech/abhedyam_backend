services:
  abhedyam-backend:
    image: ghcr.io/marava-tech/abhedyam-backend:latest
    container_name: abhedyam-backend
    pull_policy: always
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
    ports:
      - "8600:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?createDatabaseIfNotExist=true
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1296000000}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_SMTP_AUTH: ${EMAIL_SMTP_AUTH:-true}
      EMAIL_STARTTLS_ENABLE: ${EMAIL_STARTTLS_ENABLE:-true}
      FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      DAILY_QUOTE_ENABLED: ${DAILY_QUOTE_ENABLED:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    networks:
      - database-network

networks:
  database-network:
    external: true
    name: database-network
